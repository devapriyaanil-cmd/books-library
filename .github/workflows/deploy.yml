name: CI Test

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # upgrade to v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24          # explicitly set Node.js 24

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
